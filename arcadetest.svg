<svg xmlns="http://www.w3.org/2000/svg" 
     width="100%" 
     height="100%" 
     viewBox="0 0 1920 1080"
     style="width:100vw; height:100vh; overflow:visible; background:#020403; display:block;">
  
  <foreignObject x="0" y="0" width="1920" height="1080">
    <body xmlns="http://www.w3.org/1999/xhtml" 
          style="margin:0; padding:0; width:100vw; height:100vh; overflow-y:scroll; background:#020403; font-family:'Poppins', sans-serif;">

      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <title>Unknowns Realm Games</title>

      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&amp;display=swap" rel="stylesheet" />

      <style>
        body {
          margin: 0;
          padding: 0;
          background: #020403;
          color: white;
          font-family: 'Poppins', sans-serif;
          overflow-y: scroll;
          height: 100vh;
          width: 100vw;
        }

        /* Scrollbar */
        body::-webkit-scrollbar { width: 10px; }
        body::-webkit-scrollbar-track { background: rgba(0,255,106,0.08); border-radius: 10px; }
        body::-webkit-scrollbar-thumb { background: rgba(0,255,106,0.5); border-radius: 10px; box-shadow: 0 0 10px rgba(0,255,106,0.7); }

        .top-title {
          text-align: center;
          font-size: 42px;
          font-weight: 700;
          padding: 25px 0 15px 0;
          color: #ffffff;
          text-shadow: 0 0 15px #00ff6a, 0 0 30px #00ff6a;
          margin: 0;
        }

        .section-title {
          font-size: 28px;
          font-weight: 700;
          margin: 35px 0 15px 20px;
          color: #7dffb8;
          text-shadow: 0 0 12px #00ff6a;
        }

        .search-bar {
          width: 96%;
          max-width: 1400px;
          margin: 0 auto 20px;
          background: rgba(0,255,106,0.08);
          border-radius: 20px;
          padding: 12px;
          border: 1px solid rgba(0,255,106,0.3);
          box-shadow: 0 0 15px rgba(0,255,106,0.25);
        }

        .search-bar input {
          width: 100%;
          padding: 14px;
          font-size: 19px;
          text-align: center;
          color: #00ff6a;
          background: #020403;
          border: 1px solid rgba(0,255,106,0.4);
          border-radius: 12px;
          outline: none;
          box-shadow: 0 0 12px rgba(0,255,106,0.4);
        }

        .icon-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 18px;
          padding: 0 20px 40px;
          max-width: 1600px;
          margin: 0 auto;
        }

        .icon {
          position: relative;
          width: 150px;
          height: 150px;
          border-radius: 20px;
          overflow: hidden;
          cursor: pointer;
          background: #050b09;
          border: 1px solid rgba(0,255,106,0.4);
          box-shadow: 0 0 16px rgba(0,255,106,0.25);
          transition: all 0.3s ease;
          text-decoration: none;
          display: block;
        }

        .icon:hover {
          border-color: rgba(0,255,106,0.9);
          box-shadow: 0 0 25px rgba(0,255,106,0.7);
          transform: scale(1.06);
        }

        .icon img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          filter: grayscale(100%);
          transition: 0.4s;
        }

        .icon:hover img {
          filter: grayscale(0%);
        }

        .icon-text {
          position: absolute;
          bottom: -100%;
          left: 50%;
          transform: translateX(-50%);
          width: 100%;
          padding: 8px 0;
          color: #00ff6a;
          font-weight: bold;
          text-align: center;
          text-shadow: 0 0 10px #00ff6a;
          transition: bottom 0.4s ease;
          background: rgba(0,0,0,0.75);
        }

        .icon:hover .icon-text {
          bottom: 0;
        }

        /* Make it feel more full-screen */
        @media (max-width: 768px) {
          .top-title { font-size: 32px; }
          .section-title { font-size: 24px; margin-left: 15px; }
          .icon-grid { gap: 14px; padding: 0 15px 30px; }
          .icon { width: 130px; height: 130px; }
        }
      </style>

      <div class="top-title">Unknowns Realm Games</div>

      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="Search games..." />
      </div>

      <!-- 🔥 Most Popular Games -->
      <div class="section-title">🔥 Most Popular Games</div>
      <div class="icon-grid">
        <a onclick="game('theyarecoming')" class="icon">
          <img src="https://th.bing.com/th/id/R.44481690525ad69b8651b2360629ba82?rik=qnQfzMfwKZnLGw&amp;pid=ImgRaw&amp;r=0" />
          <div class="icon-text">They Are Coming</div>
        </a>
        <a onclick="game('clusterrush')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.YgRC_YJREkbKlvRFOZM-agAAAA" />
          <div class="icon-text">Cluster Rush</div>
        </a>
        <a onclick="game('kartbrosv2')" class="icon">
          <img src="https://www.bing.com/th/id/OIP.qrBFkmBobeqDec6nCfG5vAHaHa" />
          <div class="icon-text">Kart Bros</div>
        </a>
        <a onclick="game('escccprd2')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.vU02x-VF4zSaKshquiuUDAAAAA" />
          <div class="icon-text">Escape Road 2</div>
        </a>
      </div>

      <!-- 👥 2 Player Games -->
      <div class="section-title">👥 2 Player Games</div>
      <div class="icon-grid">
        <a onclick="game('soccerbrosv1')" class="icon">
          <img src="https://www.bing.com/th/id/OIP.eQKEmjnMR7NX5I_wBpYcfAAAAA" />
          <div class="icon-text">Soccer Bros</div>
        </a>
        <a onclick="game('soccerrandom')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.4tEh8Eg-GQuXGPmkuVNUAgHaHa" />
          <div class="icon-text">Soccer Random</div>
        </a>
        <a onclick="game('basketrandom')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.Mnn3DuxS17bBpOcgIf6bSQHaHa" />
          <div class="icon-text">Basket Random</div>
        </a>
        <a onclick="game('volleyrandom')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.p3iEtebIVZjdbhekzo3niwHaHa" />
          <div class="icon-text">Volley Random</div>
        </a>
        <a onclick="game('boxingrandom')" class="icon">
          <img src="https://tse1.mm.bing.net/th/id/OIP.YIy-VT9zXUpO6d0gFEb86gHaHa" />
          <div class="icon-text">Boxing Random</div>
        </a>
        <a onclick="game('basketballstars')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.uIChPKqkGCzVAlZA224IYgHaHa" />
          <div class="icon-text">Basketball Stars</div>
        </a>
      </div>

      <!-- 🎮 All Games -->
      <div class="section-title">🎮 All Games</div>
      <div class="icon-grid">
        <!-- Add all your remaining games here the same way as above -->
        <!-- I kept a few examples - just copy-paste the rest from previous version -->
        <a onclick="game('escapemrms')" class="icon">
          <img src="https://www.bing.com/th/id/OIP.XAaOmMaJWZEgiko9Fv8CaAHaHa" />
          <div class="icon-text">Escape Road</div>
        </a>
        <!-- ... paste the rest of your games ... -->
      </div>

      <script>
        const CDN_BASE = "https://cdn.jsdelivr.net/gh/unknownsowner/htmlcode@main";
        function game(name) {
          const url = `${CDN_BASE}/${name}.xml`;
          const win = window.open("about:blank", "_blank");
          fetch(url)
            .then(res => res.text())
            .then(code => {
              win.document.open();
              win.document.write(code);
              win.document.close();
            })
            .catch(() => win.document.write("Error loading game."));
        }
      </script>

      <script>
        const searchInput = document.getElementById("searchInput");
        const allIcons = document.querySelectorAll(".icon");
        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase();
          allIcons.forEach(icon => {
            const text = icon.querySelector(".icon-text").textContent.toLowerCase();
            icon.style.display = text.includes(query) ? "block" : "none";
          });
        });
      </script>

    </body>
  </foreignObject>
</svg>
