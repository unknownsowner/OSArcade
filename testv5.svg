<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1920 1080" style="position:fixed;top:0;left:0;width:100%;height:100%;overflow:visible;">
  <foreignObject x="0" y="0" width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;height:100vh;overflow-y:scroll;background:#020403;">
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Unknowns Realm Games</title>

      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&amp;display=swap" rel="stylesheet">

      <style>
        body {
          margin: 0;
          background: #020403;
          color: white;
          font-family: 'Poppins', sans-serif;
          overflow-y: scroll;
          height: 100vh;
        }
        /* Keep all your original styles exactly the same from here */
        body::-webkit-scrollbar { width: 10px; }
        body::-webkit-scrollbar-track { background: rgba(0,255,106,0.08); border-radius: 10px; }
        body::-webkit-scrollbar-thumb { background: rgba(0,255,106,0.5); border-radius: 10px; box-shadow: 0 0 10px rgba(0,255,106,0.7); }

        .top-title { text-align: center; font-size: 38px; font-weight: 700; padding: 20px 0 10px 0; color: #ffffff; text-shadow: 0 0 10px #00ff6a, 0 0 20px #00ff6a; }
        .section-title { font-size: 26px; font-weight: 700; margin: 30px 0 10px 15px; color: #7dffb8; text-shadow: 0 0 10px #00ff6a; }
        .search-bar { width: 95%; margin: 0 auto; background: rgba(0,255,106,0.08); border-radius: 20px; padding: 10px; border: 1px solid rgba(0,255,106,0.3); box-shadow: 0 0 12px rgba(0,255,106,0.25); }
        .search-bar input { width: 100%; padding: 10px; font-size: 18px; text-align: center; color: #00ff6a; background: #020403; border: 1px solid rgba(0,255,106,0.4); border-radius: 12px; outline: none; box-shadow: 0 0 10px rgba(0,255,106,0.4); }
        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .icon { position: relative; width: 140px; height: 140px; border-radius: 18px; overflow: hidden; cursor: pointer; background: #050b09; border: 1px solid rgba(0,255,106,0.4); box-shadow: 0 0 14px rgba(0,255,106,0.25); transition: 0.3s ease; text-decoration: none; display: block; }
        .icon:hover { border-color: rgba(0,255,106,0.8); box-shadow: 0 0 18px rgba(0,255,106,0.6); transform: scale(1.04); }
        .icon img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.4s; }
        .icon:hover img { filter: grayscale(0%); }
        .icon-text { position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: 100%; padding: 6px 0; color: #00ff6a; font-weight: bold; text-align: center; text-shadow: 0 0 10px #00ff6a; transition: bottom 0.4s ease; background: rgba(0,0,0,0.6); }
        .icon:hover .icon-text { bottom: 0; }
      </style>

      <!-- Your content (top-title, search, sections, all icon-grids) goes here -->
      <!-- Paste the entire <div class="top-title"> ... all the way to the last </div> of the All Games grid -->

      <!-- Game Loader Script -->
      <script>
        const CDN_BASE = "https://cdn.jsdelivr.net/gh/unknownsowner/htmlcode@main";
        function game(name) {
          const url = `${CDN_BASE}/${name}.xml`;
          const win = window.open("about:blank", "_blank");
          fetch(url).then(r => r.text()).then(code => {
            win.document.open();
            win.document.write(code);
            win.document.close();
          }).catch(() => win.document.write("Error loading game."));
        }
      </script>

      <!-- Search Script -->
      <script>
        const searchInput = document.getElementById("searchInput");
        const allIcons = document.querySelectorAll(".icon");
        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase();
          allIcons.forEach(icon => {
            const text = icon.querySelector(".icon-text").textContent.toLowerCase();
            icon.style.display = text.includes(query) ? "block" : "none";
          });
        });
      </script>

      <!-- Final compatibility fix -->
      <script>
        // Simple fix for foreignObject issues
        document.documentElement.style.height = "100%";
      </script>
    </body>
  </foreignObject>
</svg>
