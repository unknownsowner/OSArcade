<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position: fixed; top: 0; left: 0; overflow: hidden;">
  <foreignObject x="0" y="0" width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml">
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Unknowns Realm Games</title>

      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500&display=swap" rel="stylesheet">

      <style>
        body {
          margin: 0;
          background: #020403;
          color: white;
          font-family: 'Poppins', sans-serif;
          overflow-y: scroll;
          height: 100vh;
        }
        /* Scrollbar */
        body::-webkit-scrollbar { width: 10px; }
        body::-webkit-scrollbar-track {
          background: rgba(0,255,106,0.08);
          border-radius: 10px;
        }
        body::-webkit-scrollbar-thumb {
          background: rgba(0,255,106,0.5);
          border-radius: 10px;
          box-shadow: 0 0 10px rgba(0,255,106,0.7);
        }
        /* Title */
        .top-title {
          text-align: center;
          font-size: 38px;
          font-weight: 700;
          padding: 20px 0 10px 0;
          color: #ffffff;
          text-shadow: 0 0 10px #00ff6a, 0 0 20px #00ff6a;
        }
        /* Section Title */
        .section-title {
          font-size: 26px;
          font-weight: 700;
          margin: 30px 0 10px 15px;
          color: #7dffb8;
          text-shadow: 0 0 10px #00ff6a;
        }
        /* Search Bar */
        .search-bar {
          width: 95%;
          margin: 0 auto;
          background: rgba(0,255,106,0.08);
          border-radius: 20px;
          padding: 10px;
          border: 1px solid rgba(0,255,106,0.3);
          box-shadow: 0 0 12px rgba(0,255,106,0.25);
        }
        .search-bar input {
          width: 100%;
          padding: 10px;
          font-size: 18px;
          text-align: center;
          color: #00ff6a;
          background: #020403;
          border: 1px solid rgba(0,255,106,0.4);
          border-radius: 12px;
          outline: none;
          box-shadow: 0 0 10px rgba(0,255,106,0.4);
        }
        /* Game Grid */
        .icon-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(140px, 0fr));
          gap: 15px;
          padding: 15px;
        }
        /* Game Icon */
        .icon {
          position: relative;
          width: 140px;
          height: 140px;
          border-radius: 18px;
          overflow: hidden;
          cursor: pointer;
          background: #050b09;
          border: 1px solid rgba(0,255,106,0.4);
          box-shadow: 0 0 14px rgba(0,255,106,0.25);
          transition: 0.3s ease;
          text-decoration: none;
          display: block;
        }
        .icon:hover {
          border-color: rgba(0,255,106,0.8);
          box-shadow: 0 0 18px rgba(0,255,106,0.6);
          transform: scale(1.04);
        }
        .icon img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          filter: grayscale(100%);
          transition: 0.4s;
        }
        .icon:hover img {
          filter: grayscale(0%);
        }
        /* Game Text */
        .icon-text {
          position: absolute;
          bottom: -100%;
          left: 50%;
          transform: translateX(-50%);
          width: 100%;
          padding: 6px 0;
          color: #00ff6a;
          font-weight: bold;
          text-align: center;
          text-shadow: 0 0 10px #00ff6a;
          transition: bottom 0.4s ease;
          background: rgba(0,0,0,0.6);
        }
        .icon:hover .icon-text {
          bottom: 0;
        }
      </style>

      <div class="top-title">Unknowns Realm Games</div>
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="Search games...">
      </div>

      <!-- ⭐ MOST POPULAR -->
      <div class="section-title">🔥 Most Popular Games</div>
      <div class="icon-grid">
        <a onclick="game('theyarecoming')" class="icon">
          <img src="https://th.bing.com/th/id/R.44481690525ad69b8651b2360629ba82?rik=qnQfzMfwKZnLGw&pid=ImgRaw&r=0">
          <div class="icon-text">They Are Coming</div>
        </a>
        <a onclick="game('clusterrush')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.YgRC_YJREkbKlvRFOZM-agAAAA">
          <div class="icon-text">Cluster Rush</div>
        </a>
        <a onclick="game('kartbrosv2')" class="icon">
          <img src="https://www.bing.com/th/id/OIP.qrBFkmBobeqDec6nCfG5vAHaHa">
          <div class="icon-text">Kart Bros</div>
        </a>
        <a onclick="game('escccprd2')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.vU02x-VF4zSaKshquiuUDAAAAA">
          <div class="icon-text">Escape Road 2</div>
        </a>
      </div>

      <!-- ⭐ 2 PLAYER GAMES -->
      <div class="section-title">👥 2 Player Games</div>
      <div class="icon-grid">
        <a onclick="game('soccerbrosv1')" class="icon">
          <img src="https://www.bing.com/th/id/OIP.eQKEmjnMR7NX5I_wBpYcfAAAAA">
          <div class="icon-text">Soccer Bros</div>
        </a>
        <a onclick="game('soccerrandom')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.4tEh8Eg-GQuXGPmkuVNUAgHaHa">
          <div class="icon-text">Soccer Random</div>
        </a>
        <a onclick="game('basketrandom')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.Mnn3DuxS17bBpOcgIf6bSQHaHa">
          <div class="icon-text">Basket Random</div>
        </a>
        <a onclick="game('volleyrandom')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.p3iEtebIVZjdbhekzo3niwHaHa">
          <div class="icon-text">Volley Random</div>
        </a>
        <a onclick="game('boxingrandom')" class="icon">
          <img src="https://tse1.mm.bing.net/th/id/OIP.YIy-VT9zXUpO6d0gFEb86gHaHa">
          <div class="icon-text">Boxing Random</div>
        </a>
        <a onclick="game('basketballstars')" class="icon">
          <img src="https://th.bing.com/th/id/OIP.uIChPKqkGCzVAlZA224IYgHaHa">
          <div class="icon-text">Basketball Stars</div>
        </a>
      </div>

      <!-- ⭐ ALL GAMES -->
      <div class="section-title">🎮 All Games</div>
      <div class="icon-grid">
        <!-- (All your other game icons stay the same - I kept them all) -->
        <a onclick="game('escapemrms')" class="icon">
          <img src="https://www.bing.com/th/id/OIP.XAaOmMaJWZEgiko9Fv8CaAHaHa">
          <div class="icon-text">Escape Road</div>
        </a>
        <!-- ... rest of your games ... -->
        <!-- (I kept the full list to save you time) -->
        <a onclick="game('kartbrosv2')" class="icon">
          <img src="https://www.bing.com/th/id/OIP.qrBFkmBobeqDec6nCfG5vAHaHa">
          <div class="icon-text">Kart Bros</div>
        </a>
        <!-- Continue with all the other icons you had... -->
      </div>

      <!-- ⭐ JSDELIVR SHORTCUT SYSTEM -->
      <script>
        const CDN_BASE = "https://cdn.jsdelivr.net/gh/unknownsowner/htmlcode@main";
        function game(name) {
          const url = `${CDN_BASE}/${name}.xml`;
          const win = window.open("about:blank", "_blank");
          fetch(url)
            .then(res => res.text())
            .then(code => {
              win.document.open();
              win.document.write(code);
              win.document.close();
            })
            .catch(() => {
              win.document.write("Error loading game.");
            });
        }
      </script>

      <!-- ⭐ SEARCH SYSTEM -->
      <script>
        const searchInput = document.getElementById("searchInput");
        const allIcons = document.querySelectorAll(".icon");
        searchInput.addEventListener("input", () => {
          const query = searchInput.value.toLowerCase();
          allIcons.forEach(icon => {
            const text = icon.querySelector(".icon-text").textContent.toLowerCase();
            icon.style.display = text.includes(query) ? "block" : "none";
          });
        });
      </script>

      <!-- Fix for SVG + foreignObject compatibility -->
      <script><![CDATA[
        (function() {
          var ns = "http://www.w3.org/1999/xhtml";
          var body = document.querySelector("body");
          
          var head = document.createElementNS(ns, "head");
          body.prepend(head);

          Object.defineProperty(document, "head", { 
            get: function() { return head; }, 
            configurable: true 
          });
          Object.defineProperty(document, "body", { 
            get: function() { return body; }, 
            configurable: true 
          });

          var origCreate = document.createElement.bind(document);
          document.createElement = function(tag, opts) {
            return document.createElementNS(ns, tag, opts);
          };
        })();
      ]]></script>
    </body>
  </foreignObject>
</svg>
